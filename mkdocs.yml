site_name: Azure Scout
site_description: Scout Azure regions for VM availability, zone mappings, pricing, spot scores, and quota — then plan deployments with confidence.
site_url: https://docs.az-scout.com
repo_url: https://github.com/az-scout/az-scout
repo_name: az-scout/az-scout
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/favicon.svg
  favicon: assets/favicon.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

plugins:
  - search

hooks:
  - tools/docs_hooks/pre_post_build.py

watch:
  - docs
  - mkdocs.yml
  - tools/docs_hooks
  - CHANGELOG.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: [docs, .]
      restrict_base_path: false
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Features: features.md
  - AI Integration:
    - MCP server: ai/mcp.md
    - Terminal Chat: ai/cli-chat.md
    - Prompt Examples: ai/prompts.md
  - Scoring: scoring.md
  - API Reference: api.md
  - Deployment:
    - ACA Deployment: deployment/aca.md
    - EasyAuth Guide: deployment/easyauth.md
    - OBO Authentication: deployment/obo-auth.md
  - Architecture: architecture.md
  - Plugins:
    - plugins/index.md
    - Scaffold Reference: plugins/scaffold.md
    - Catalog: plugins/catalog.md
  - Changelog: _changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/az-scout/az-scout
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/az-scout/

extra_css:
  - assets/extra.css

docs_dir: docs
site_dir: site
exclude_docs: |
  plugin-scaffold/**
  _includes/**
